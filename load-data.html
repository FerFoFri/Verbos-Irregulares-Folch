async function saveCole(id, nombre) {
  await setDoc(doc(db, "coles", id), { nombre, idioma: "ca", activo: true });
  log(`✅ Cole ${id} (${nombre}) creat`, 'ok');
}

async function saveVerbs(coleId, verbs) {
  log(`📝 Carregant ${verbs.length} verbs per cole ${coleId}...`, 'info');
  // Use batches of 500
  const batches = [];
  for(let i = 0; i < verbs.length; i += 400) {
    batches.push(verbs.slice(i, i + 400));
  }
  for(const batch of batches) {
    const b = writeBatch(db);
    batch.forEach(verb => {
      const ref = doc(collection(db, "coles", coleId, "verbos"));
      b.set(ref, verb);
    });
    await b.commit();
  }
  log(`✅ ${verbs.length} verbs carregats per cole ${coleId}`, 'ok');
}
